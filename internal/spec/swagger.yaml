      security:
      - BearerAuth: []
      summary: Get weekly trend aggregates
      tags:
      - summary
  /sync/{source}:
    post:
      description: Forces a sync for the named source. Pass "all" to sync every registered
        source. Use when the user wants their data refreshed before analysis.
      operationId: sync_trigger
      parameters:
      - description: 'Source name: oura, strava, hevy, inbody, or all'
        in: path
        name: source
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              records_added:
                type: integer
              source:
                type: string
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_new-marty_health-connect_internal_apperror.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_new-marty_health-connect_internal_apperror.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_new-marty_health-connect_internal_apperror.Response'
      security:
      - BearerAuth: []
      summary: Trigger an on-demand sync
      tags:
      - sync
  /sync/status:
    get:
      description: Returns last successful sync timestamp, last status, and total
        records added per source.
      operationId: sync_status
      produces:
