        date range and activity type filter. Use this for questions about workouts,
        distance, pace, or cardio output.
      operationId: strava_list_activities
      parameters:
      - description: Start date (YYYY-MM-DD), inclusive
        in: query
        name: from
        type: string
      - description: End date (YYYY-MM-DD), inclusive
        in: query
        name: to
        type: string
      - description: Activity type filter (e.g. Run, Ride, Swim, Walk)
        in: query
        name: type
