  /summary/daily:
    get:
      description: Aggregates Oura, Strava, Hevy, InBody, Apple Health, and meals
        into a single daily summary. Use this as the default starting point when the
        user asks "how was my day" or "summarize my health on date X".
      operationId: summary_daily
      parameters:
      - description: Exact day (YYYY-MM-DD)
        in: query
        name: date
        type: string
      - description: Start date (YYYY-MM-DD), inclusive — ignored if date is set
        in: query
        name: from
        type: string
      - description: End date (YYYY-MM-DD), inclusive — ignored if date is set
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                items:
                  $ref: '#/definitions/internal_summary.DailySummary'
                type: array
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_new-marty_health-connect_internal_apperror.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_new-marty_health-connect_internal_apperror.Response'
      security:
      - BearerAuth: []
      summary: Get daily cross-source summary
      tags:
      - summary
  /summary/report:
    get:
      description: Returns a rolling-window report ending at `date` covering the past
        `lookback` days (default 30). Use for "give me a report" requests.
      operationId: summary_report
      parameters:
      - description: End date of the report (YYYY-MM-DD); defaults to today
        in: query
        name: date
        type: string
      - description: Number of days to look back from date (default 30)
        in: query
        name: lookback
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
