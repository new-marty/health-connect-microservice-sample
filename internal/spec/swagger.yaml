      security:
      - BearerAuth: []
      summary: Get sync status per source
      tags:
      - sync
securityDefinitions:
  BearerAuth:
    description: Bearer token. Set the same value in HEALTH_CONNECT_API_TOKEN on the
      server.
    in: header
    name: Authorization
    type: apiKey
